<!DOCTYPE html>

<head>

  <meta name="description" content="Aura İntegra ERP yönetim paneli">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================================================================

     ================================================================ -->

    </div>
    <div class="sidebar-brand">
      <span class="sidebar-brand-name">Aura İntegra</span>
      <span class="sidebar-brand-sub">ERP Sistemi</span>
    </div>
  </a>

    <div class="nav-section-label">Ana Menü</div>
    <a class="nav-item" id="nav-dashboard" data-route="dashboard" href="#">

    <div class="nav-section-label">Operasyon</div>
    <a class="nav-item" id="nav-servis" data-route="teknik-servis" href="#">

    </a>
    <a class="nav-item" id="nav-alis" data-route="alis-satis" href="#">

    <a class="nav-item" id="nav-stok" data-route="stok" href="#">

      <span class="nav-badge" id="badge-stok" style="display:none">!</span>
    </a>

    <div class="nav-section-label">Finans</div>
    <a class="nav-item" id="nav-finans" data-route="finans" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span class="nav-item-label">Kasa & Finans</span>
    </a>
    <a class="nav-item" id="nav-cek" data-route="cek-yonetimi" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M7 14h.01M11 14h6"/></svg>
      <span class="nav-item-label">Çek Yönetimi</span>

    <div class="nav-section-label">CRM</div>
    <a class="nav-item" id="nav-musteriler" data-route="musteriler" href="#">

      <span class="nav-item-label">Müşteri Portali</span>

      <span class="nav-item-label">Raporlar</span>
    </a>

    <div class="nav-section-label">Sistem</div>
    <a class="nav-item" id="nav-admin" data-route="admin" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span class="nav-item-label">Admin Panel</span>
    </a>
    <a class="nav-item" id="nav-ayarlar" data-route="ayarlar" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user" id="sidebar-user-btn">
      <div class="user-avatar" id="user-avatar-initials">MD</div>
      <div class="user-info">
        <span class="user-name" id="user-display-name">Mehmet Demir</span>
        <span class="user-role" id="user-role-label">Teknisyen · Merkez</span>
      </div>
    </div>
    <button class="sidebar-collapse-btn" id="collapse-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span>Daralt</span>
    </button>
  </div>
</aside>

<!-- ================================================================
     APP WRAPPER
     ================================================================ -->
<div id="app-wrapper">

  <header id="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>

    <div class="topbar-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="global-search" placeholder="Servis ID, müşteri, IMEI ara..." autocomplete="off">
    </div>

    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" id="btn-quick-new-servis">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Yeni Servis
      </button>
      <button class="icon-btn" id="notif-btn" title="Bildirimler">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-dot" id="notif-dot"></span>
      </button>
      <button class="icon-btn" id="logout-btn" title="Çıkış Yap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <main id="main-content">
    <!-- JS ile doldurulur -->
  </main>
</div>

<!-- ================================================================
     MODAL
     ================================================================ -->
<div id="modal-overlay">
  <div class="modal-container" id="modal-container">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title-text">Başlık</h2>
      <button class="icon-btn" id="modal-close-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer" style="display:none"></div>
  </div>
</div>

<!-- ================================================================
     TOAST CONTAINER
     ================================================================ -->
<div id="toast-container"></div>

<!-- Main ERP Application Script -->
<script type="module" src="./script.js"></script>
</body>
</html>
